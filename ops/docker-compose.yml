version: "3.9"

# Docker Compose for LOCAL DEVELOPMENT ONLY
# Production uses Supabase Postgres - set DATABASE_URL environment variable to your Supabase connection string

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deliverty
    ports:
      - "5433:5432"  # Mapped to 5433 to avoid conflicts with local Postgres
    volumes:
      - dbdata:/var/lib/postgresql/data
      # run our .sql on first boot
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  dbdata:
